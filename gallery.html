<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Caftan by Aya | Collection</title>
    <style>
        body { margin: 0; font-family: 'Georgia', serif; background-color: #FFFFFF; color: #333; }
        header { background: white; padding: 20px; text-align: center; border-bottom: 2px solid #FFDBE9; }
        nav a { text-decoration: none; color: #555; margin: 0 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8em; }
        nav a:hover { color: #d4af37; }

        .container { padding: 40px; text-align: center; }
        h2 { color: #F4D1D1; letter-spacing: 3px; margin-bottom: 40px; }

        /* Grille de photos */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-grid img {
            width: 100%;
            height: 400px;
            object-fit: cover; /* Pour que les photos ne soient pas déformées */
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .gallery-grid img:hover { transform: scale(1.03); }

        footer { background: #222; color: #FFDBE9; padding: 30px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1 style="color: #F4D1D1; letter-spacing: 4px; margin: 0;">CAFTAN BY AYA</h1>
        <nav style="margin-top: 15px;">
            <a href="index.html">Accueil</a>
            <a href="gallery.html">Collection</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="container">
        <h2>NOTRE COLLECTION</h2>
        <div class="gallery-grid">
            <img src="img1.jpg" alt="Caftan 1">
            <img src="img2.jpg" alt="Caftan 2">
            <img src="img3.jpg" alt="Caftan 3">
            <img src="img4.jpg" alt="Caftan 4">
            <img src="img5.jpg" alt="Caftan 5">
            <img src="img6.jpg" alt="Caftan 6">
            <img src="img7.jpg" alt="Caftan 7">
            <img src="img8.webp" alt="Caftan 8">
            <img src="img9.webp" alt="Caftan 9">
            <img src="img10.webp" alt="Caftan 10">
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Aya Kouhail - Créations d'Exception</p>
    </footer>

</body>
</html>
